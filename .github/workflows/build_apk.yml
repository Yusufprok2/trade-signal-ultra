name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          buildozer_version: stable

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v8.0-build-${{ github.run_number }}
          name: "Trade Sinyal Ultra v8.0 — Build #${{ github.run_number }}"
          files: ${{ steps.buildozer.outputs.filename }}
          token: ${{ secrets.GITHUB_TOKEN }}
