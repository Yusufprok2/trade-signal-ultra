name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: APK derle (Docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/home/user/hostcwd \
            kivy/buildozer:latest \
            -v android debug

      - name: APK bul
        id: apk
        run: |
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          echo "APK: $APK"
          if [ -z "$APK" ]; then exit 1; fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v8.0-build-${{ github.run_number }}
          name: "Trade Sinyal Ultra v8.0 — Build #${{ github.run_number }}"
          files: ${{ steps.apk.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
