name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.10 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Sistem bağımlılıkları
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: pip araçları
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: APK derle
        run: |
          buildozer -v android debug 2>&1 | tail -100

      - name: APK dosyasını bul
        id: apk
        run: |
          APK=$(find . -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK: $APK"

      - name: Release yayınla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v7.0-build-${{ github.run_number }}
          name: "Trade Sinyal Ultra v7.0 — Build #${{ github.run_number }}"
          body: |
            ## 🚀 Otomatik APK Build

            **Commit:** ${{ github.sha }}
            **Tarih:** ${{ github.event.head_commit.timestamp }}

            ### Kurulum
            1. `trade-sinyal-ultra-debug.apk` dosyasını indir
            2. Android'de "Bilinmeyen kaynaklardan yükle" izni ver
            3. APK'yı yükle ve çalıştır
          files: ${{ steps.apk.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
